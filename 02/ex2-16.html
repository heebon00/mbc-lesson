<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동적 관련 가상 클래스 선택자</title>
    <style>
    input:hover{border: 3px solid red;
    background: pink;}
     input:focus{border: none;
        outline: 4px dashed green;
    background: red;
color: white;}
    </style>
</head>
<body>

    <h1>동적 관련 가상 클래스 선택자</h1>
    <hr>
    
    <h2>로그인</h2>
    
    <div class="login-box">
        <div class="form-group">
            <label for="uid">아이디</label>
            <input type="text" id="uid" name="uid">
        </div>
        <div class="form-group">
            <label for="upw">비밀번호</label>
            <input type="password" id="upw" name="upw">
        </div>
        <button type="button">login</button>
    </div>

</body>
</html>
