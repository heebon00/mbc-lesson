<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>unit(단위)</title>
    <style>
      :root {
        font-size: 16px;
      }

      body {
        font-family: sans-serif;
        margin: 0;
        padding: 20px;
      }
      /* 절대단위 */
      .parent {
        font-size: 20px;
        width: 400px;
        height: 300px;
        height: 600px;
        background-color: #eee;
        border: 2px solid #333;
        padding: 10px;
      }
      .em {
        font-size: 2em; /* 20em*2 =40px */
        width: 9em;
        background-color: antiquewhite;
      } /* 너비 게산시 자신의 폰트 크기를 기준으로 */

     .rem{  /*최상위 기준인 root의 폰트 기준  */
        font-size: 2rem; /* 20em*2 =40px */
        width: 25rem;
        background-color: antiquewhite;
      } /* 너비 게산시 자신의 폰트 크기를 기준으로 */
      .vh{ /* 창의 높이에 ㄸ  */
        height: 20vh;
        background-color: #ddf;
        font-size: 5vh;
      }
      .parent{width: 50%;
    height: 50%;
background-color: #dff;
}
    </style>
  </head>
  <body>
    <!--     <div>DIV=부모
        <span>span=자식</span>
</div>
<hr>
<div class="rem">REM=부모 <span>span=자식</span></div> -->

    <div class="parent">
      부모 요소 (font-size 20px, 400x300)

      <p class="em">em: 부모 폰트(20px) × 2 = 40px</p>
      <p class="rem">rem: 루트 폰트(16px) × 2 = 32px</p>
      <div class="vh">vh: 화면 높이의 20%</div>
      <div class="vw">vw: 화면 너비의 50%</div>
      <div class="percent">%: 부모(400x300)의 50%</div>
    </div>
  </body>
</html>
