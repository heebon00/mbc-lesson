<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테두리 이미지</title>
<style>
body{margin: 20px;}
div{width:600px;
height: 50px;
padding: 15px;
border: 10px solid transparent;}     /* .repeat 는 div 와 함께 */
.round{border-image: url(./img/border.png) 20;
border-image: linear-gradient(blue,pink) 27;  /* 그라디언트는 이미지는 아님 */
/* border-radius: 40px */
}
.repeat{ border-image:url(./img/border.png)20 repeat;}
.stretch{ border-image: url(./img/border.png) 20;}
</style>

</head>
<body>
     <div class="round">
         It's impossible not only starting good but also keeping it firm!!</div>
     <div class="repeat">
         It's impossible not only starting good but also keeping it firm!!</div>
     <div class="stretch">
         It's impossible not only starting good but also keeping it firm!!</div>
</body>
</html>
