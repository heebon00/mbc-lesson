<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D 변형 실습</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        background: orange;
        margin: 50px;
        transition-property: transform; /* 호버가 아닐떄 원래 위치로 돌아가는  */
        transition-duration: 1s;
      }
      .box1 {
        width: 100px;
        height: 100px;
        background: orange;
        margin: 50px;
        transition-property: transform; /* 호버가 아닐떄 원래 위치로 돌아가는  */
        transition-duration: 1s;
      }
   .box2 {
        width: 100px;
        height: 100px;
        background: orange;
        margin: 50px;
        transition-property: transform; /* 호버가 아닐떄 원래 위치로 돌아가는  */
        transition-duration: 1s;
      }
      .box:hover {
        transform: scale(5.5) translate(50px, 50px) rotate(180deg);
      }
      .box1:hover:after {
        width: 100%;
      }
      .box1 {
        position: relative;
      }
      .box1:after {
        position: absolute;
        left: 50px;
        top: calc(100% - 5px);
        content: "";
        /*  display: block; */
        width: 0%;
        height: 5px;
        background: yellowgreen;
        transform: translate(-50%, 0);
        transition: width 0.5s;
      }
      .box1::before {
        position: absolute;
        content: "";
        width: 100%;
        height: 100%;
        background: rgba(114, 182, 199, 0.199);
        backdrop-filter: blur(1.5px);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0); /* a>b로 바뀌기 위해서는 아래에 내용 그대로 입력 */
        z-index: 1;
        transition: all 0.5s;
      }
      .box1:hover::before {
        transform: translate(-50%, -50%) scale(1.5);
      } /* a>b로 바뀌기 위해서는 위에 내용 그대로 입력 */
      .box2{transform: skewX(15deg) skewY(35deg) skew(15deg, 35deg);}
    </style>
  </head>
  <body>
    <div class="box">2D Transform</div>
    <div class="box1">2D Transform</div>
    <div class="box2">2D Transform</div>
  </body>
</html>
