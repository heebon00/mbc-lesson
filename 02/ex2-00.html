<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>형성평가</title>
    <style>
        *{margin: 1px;font-family: Verdana, Geneva, Tahoma, sans-serif;}
        #tea3{color: brown; font-weight: 600;}
        h2,span{color: red; font-weight: 600;}
        li{padding: 5px; font-weight: 600;}
      h1{margin-bottom: 6px;font-size: 32px;}
      .gray>h2{color: red;}
      h1{background-color: rgb(237, 239, 176);}
      .tea_type{color: blue;}
      .green_text p{color: green; padding: 0; padding-bottom: 0; padding-top: 0px; margin: 0px;}
      .gray {padding: 10px; padding-bottom: 0px; margin: 0px; background-color: gray;}
      .mint+li{padding: 3px; margin: 0px; background-color: rgb(237,239,176);}
      .mint+li+p{padding: 3px; margin: 0px; background-color: rgb(237,239,176);}
      .white~p{padding: 3px; margin:0px; background-color: white;}
      .white~li{ padding: 3px; margin:0px; background-color: white;}

    </style>
</head>
<body>
    
    <h1>건강한 하루</h1>
    <div class="gray">
    <h2>건강해지는 차</h2>
    <p>머리와 피부에 좋은 차는 어떤 것들일까. <a class="tea_type">차의 종류</a>  에 대해 알아보도록 합시다</p>
      <div class="green_text">
    <ul>
        <a class="mint"></a>
        <li>대나무차 <span class="price">20,000원</span></li>
        <p>얼굴에 물을 주는 효과가 있다.</p>
        <li>감잎차 <span class="price">20,000원</span></li>
        <p>빈혈있는 사람에게 효과가 있다.</p>
        <a class="white"></a>
        <li id="tea3">결명자차  <span class="price">20,000원</span></li>
        <p>눈을 밝혀주는 효과가 있다.</p>
        <p>보리차와 비슷하나 맛이 더 은은하고 구수하다</p></div>
    </ul>
</div>
</body>
</html>
