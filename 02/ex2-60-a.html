<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>float 텍스트 흐름</title>
  <style>
    img{width: 150px;
    float: right;
margin-left: 50px;}
.clear::after{ /* 클리어 픽스 해줘*/
    content: '';
display: block;
clear: both;
}
.container:nth-of-type(2) img {float: left;
margin: 0px 50px 0px 0px;
margin-top: 50px;}
