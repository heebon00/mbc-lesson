<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>box-sizing</title>
    <style>
            * {
              margin: 0;
              padding: 0;
            }
            body {
              background: url(img/bg_grid.png);
            }
            p {background-color: rgba(255, 255, 0, 0.6);
              border: 10px solid rgba(0, 0, 0, 5);
              width: 600px;
              height: 100px;
              margin-bottom: 10px;
            }
            .sizing{
              box-sizing: border-box;
              /* 박스크기의 계산기준 지정 */
            }
            .sizing_list{width: 500px;
       /*    margin-top: 200px;
          margin-left: auto;
          margin-right: auto; */
      margin: 200px; auto
      padding: 50px;  /* 좌우로 50씩 총 200추가 */
      height: 200px;
      box-sizing: border-box;
      box-sixing: content-box;
      list-style: none
      }
      .sizing_list li { /* 홀수 odd */s
        background: rgba(219,95,95,.8);
    display: inline-block;
width: 24%;
height: 100%;
line-height: 100%;} 

      .sizing_list li:nth-chisld(odd){ /* 홀수 odd */
        background: rgba(219,95,95,.5);}

    .sizing_list li a{text-decoration: none;
    color: white;
font-size: 1.5em;}
    </style>
  </head>
  <body>
    <p>It's impossible not only starting good but also keeping it firsm!!</p>
    <p class="sizing">
      It's impossible not only starting good but also keeping it firm!!
    </p>
    <ul class="sizing_list">
      <li><a href="#">Company</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Custommer</a></li>
      <li><a href="#">Community</a></li>
    </ul>
  </body>
</html>
