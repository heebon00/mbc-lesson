<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>16:9 반응형 영상</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
  .video {
      aspect-ratio: 16/9;
    }

    .video video {
      width: 100%;
      height: 100%;
    }

    .container {
      width: 200px;
      height: 400px;
      filter: drop-shadow(2px 2px 10px #000);
      /* box-shadow: 2px 2px 10px #ff0000; */
    }
    img{width: 100%; height: 100%;}
.fill{object-fit: fill;}
.contain{object-fit: contain;} /* 이미지 비율을 유지. 이미지 안잘림 */
.cover{object-fit: cover;} /* 이미지 비유을 유지 채움. 이미지 잘림  */
.none{object-fit: none;} /* 원래 이미지 크기 유지 */
.scale-down{object-fit: scale-down;} /* cover, contain 중 작은값으로 사용 */
.container{display: inline-block;}
  </style>
</head>
<body>
  <div class="video">
    <video src="./img/1.mp4" autoplay></video>
  </div>
    <div class="container">
    <img src="/02/img/rhino.jpg" alt="고양이" class="fill">
    <h3>object-fit: fill</h3>
  </div>
  <div class="container">
    <img src="/02/img/rhino.jpg" alt="고양이" class="contain">
    <h3>object-fit: contain</h3>
  </div>
  <div class="container">
    <img src="/02/img/rhino.jpg" alt="고양이" class="cover">
    <h3>object-fit: cover</h3>
  </div>
  <div class="container">
    <img src="/02/img/rhino.jpg" alt="고양이" class="none">
    <h3>object-fit: none</h3>
  </div>
  <div class="container">
    <img src="/02/img/rhino.jpg" alt="고양이" class="scale-down">
    <h3>object-fit: scale-down</h3>
  </div>
</body>
</html>
</body>
</html>
