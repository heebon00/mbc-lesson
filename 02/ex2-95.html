<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

     :root {
      --move: calc(100% - 300px);}
    img{padding: 0;}
    body{background: green;
   background-color: #73e114;
opacity: 0.8;
background-image: linear-gradient(135deg, #9b9b9b 25%, transparent 25%), linear-gradient(225deg, #9b9b9b 25%, transparent 25%), linear-gradient(315deg, #9b9b9b 25%, transparent 25%), linear-gradient(45deg, #9b9b9b 25%, transparent 25%);
background-size: 20px 20px;
background-position: -10px 0, -10px 0, 0 0, 0 0;}
    .ball{
        width: 200px;
        animation: cup 5s infinite alternate;
        position: absolute;
        z-index: 5;
    }
    .post{
        width: 200px;
        position: absolute;
        right: 0;
        bottom: 0;

    }

    @keyframes cup {
      0% {
        left: 0;
        transform: rotate(0deg);
      }

      50% {
        left: var(--move);
        top: 0;
      }

      100% {
        transform: rotate(720deg);
        left: var(--move);
        top: var(--move);
      }
    }
</style>
<body>
    <img src="./img/Football ball.png" alt="" class="ball">
    <img src="./img/goal post.png" alt="" class="post">

</body>
</html>
