<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform (3D)_카드 뒤집기 효과 </title>
    <style>
        .card-container{
            perspective: 1000px;
        }
        .card{width: 200px;
        height: 300px;
        transition: all 0.6s;
        transform-style: preserve-3d; 
          position: relative;
        }
        .front, .back{
            position: absolute;
            background: #3498db;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;  /* 돌렸을때 보이지 않음  */
        }
        .card:hover{
            transform: rotateY(180deg);
        }
.back{background: #2A7B9B;
background: linear-gradient(90deg, rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);
transform: rotateY(180deg);}
    </style>
</head>
<body>
    <div class="card-container">
  <div class="card">
    <div class="front">Front</div>
    <div class="back">Back</div>
  </div>
</div>
</body>
</html>
