<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상선택자</title>
    <style>
        /* : 가상 선택자 */
       a{
        text-decoration: none;
    }
    a:link{text-decoration: underline;}
    a:visited { color: green;}        /* visited 방문한 링크 색상 */
a:hover{background: black;              /* hover 마우스 올렸을때 색상 변화  */
color: whites;}
a:active{background: greenyellow;}     /*active 마우스 꾸욱 눌렀을때  */
</style>
</head>
<body>
    <ul><li><a href="#COMPANY">COMPANY</a></li></ul>
    <ul><li><a href="#PRODUCT">PRODUCT</a></li></ul>
    <ul><li><a href="#SERVICE">SERVICE</a></li></ul>
    <ul><li><a href="#CUSTOMER">CUSTOMER</a></li></ul>
    <ul><li><a href="#COMMUNITY">COMMUNITY</a></li></ul>
</body>
</html>
