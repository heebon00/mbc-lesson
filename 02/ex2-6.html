<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> id선택자</title>
    <style>    /* id > style 정의시 # 지정후 id에서 지정한 명령어tea */
        p{
            color: #c71717;}
        #tea{
            color: #0000ff;}
        #food{color: #3a0eda;}
    </style>
</head>
<body>
   <p> 우리를 <!-- <span id="tea"> -->기쁘게</span> 하는 것들</p>  <!-- id는 중복으로 사용 불가  -->
    <p id="tea">건강에 좋은 차</p>
    <p id="food">머리가 좋아지는 음식</p>
</html>
