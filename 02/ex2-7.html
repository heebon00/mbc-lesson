<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class 선택자 </title>
    <style> /* 정의시 . body에서 지정한 클래스명 으로  */
        .happy{color: blueviolet;}
        .tea{color: green;}
        .food{color: blue;}
        .t_center{text-align: center;}
    </style>
</head>
<body>
    <p class="happy">우리를 <spean class="tea">기쁘게</spean> 하는 것들</p>       <!-- 특정글자에 태그 넣을때  글자 블록지정후 ctrl+alt +A 엔터 하면 후 .spean 해당 명령어    -->
    <p class="tea t_center">건강에 좋은 차</p> <!-- 띄어쓰기로 두개의 태그 넣기 -->
    <p class="food t_center">머리가 좋아지는 음식</p>
</body>
</html>
