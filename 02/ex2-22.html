<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webfont</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dongle&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=gitlab"
    />
    <style>
      @font-face {
        font-family: "KblJumpExtended";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-5@1.0/KBLJump_EB_ExtendedTTF.woff2")
          format("woff2");
        font-weight: normal;
        font-display: swap;
      }
    </style>
    <style>
        .t1 {
          font-family: "Dongle", sans-serif;
          font-weight: 400;
          font-style: normal;
          font-size: 30px;
        }
        .t2{font-family: 'KblJumpExtended';}
        :hover.t2{color: rgb(52, 7, 252);}
        :hover.icon{color: blue;
      font-size:23px;}
    </style>
  </head>
  <body>
    <span class="material-symbols-rounded icon"> gitlab </span>
    <div class="t1">투어스 티켓팅 샤갈</div>
    <div class="t2">투어스 ㅅㅂ 티켓팅</div>
    <span class="material-symbols-rounded icon"> gitlab </span>
  </body>
</html>
