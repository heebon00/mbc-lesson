<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
         <!--    pseudo 
        의사클래스 (pesudo class): 상태, 위치를 선택 -->
<!-- 의사요소 (pesudo emelents):없는거 추가, 선택  -->
    <style>
      li {
        background: gray;
        margin-bottom: 20px;
      }
      a {
        color: black;
        text-decoration: none;
      }
      a:hover {
        color: yellow;
      }
    </style>
    <style>
      /* nth-child */
      li:nth-child(4) {
        background: beige;
      }
      li:last-child,
      li:last-child a {
        color: red;
      }
      li {
        list-style: none;
      }
    </style>
    <style>
        /* seo 와 무관한 이미지 _검색안됨 */
    li::first-letter{
    font-size: 32px;}
    li::before{content: '💚';}
    a:hover::after{content: '💛';}  /* 마우스 올릴때 나타 나기  */
    </style>
  </head>
  <body>
    <ul>
      <li><a href="#">COMPANY</a></li>
      <li><a href="#">PRODUCT</a></li>
      <li><a href="#">SERVICE</a></li>
      <li><a href="#">COMMUNITY</a></li>
    </ul>
  </body>
</html>
