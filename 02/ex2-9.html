<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하위 선택자</title>
    <style>
      .blue_text p {
        color: blue;
      } /* div 묵인 애들만 저용되는 것  [blue_text 띄어쓰기(하위선택자)] p  _P의 모든것적용 ul은 적용X */
      .blue_text ul {
        border: 1px solid;
        color: rgb(7, 7, 219);
      } /* ul을 적용해주는것  테두리 적용 */
      body .blue_text {
        background-color: rgb(177, 226, 43);
      } /* 상위(원하는 모든것을 아우르는 가장 집합적인 태그)  태그를 찾아서 적용 */
      ul li {
        color: rgb(243, 5, 5);
      }
    </style>
  </head>
  <body>
    <div class="blue_text">
      <p>7월의 여행지</p>
      <p>8월의 여행지</p>
      <ul>
        <li>1주차 여행지</li>
        <li>2주차 여행지</li>
      </ul>
    </div>
    <p>내년의 여행지</p>
  </body>
</html>
