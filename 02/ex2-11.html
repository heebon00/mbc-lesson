<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인접선택자</title> <!-- 동이 영역에서  -->
    <style>
        span+p{font-size:77px;
            font-weight:800px;}
        p+p+p{color: blue;}    /* 인접 선택자는 맨 마지막P(태그에)적용되는 것 같음??? */
        p+p+p{color: black;}
    </style>
</head>
<body>
    <span></span>
    <p>엑스포 안내</p>
    <p>책자를 배부하고 있습니다.</p>
    <p>안내데스크를 활용하시기 바랍니다</p>
</body>
