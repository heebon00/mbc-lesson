<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css" integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUl1SqPeOcg+J0/0qOcg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
.cont{display: grid;
grid-template-areas: "box1""box2""box3""box4";} 
.item:nth-child(1){grid-area: box1; background: red;}
.item:nth-child(2){grid-area: box2; background: yellow}
.item:nth-child(3){grid-area: box3; background: blue;}
.item:nth-child(4){grid-area: box4;background: green;}
.itemt{width: 50%; height: 50%;}
    </style>
</head>
<body>
    <div class="cont">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
    </div>
</body>
</html>
