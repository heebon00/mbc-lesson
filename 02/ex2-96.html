<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> transition_. 호버 이미지 확대 효과</title>
    <style>
      .item {
        width: 200px;
        height: 100px;
        background:url(./img/rhino.jpg);
        color: white;
        text-align: center;
        line-height: 100px;
        cursor: pointer;
        transition: transform;
        transition-duration: 1s;
        transition-timing-function:
        linear(0, 0.058 6%, 0.109 9.8%, 0.174 13%, 0.262 15.9%, 0.536 21.5%, 0.997 27.7%, 0.527 34.1%, 0.428 36.4%, 0.396 38.5%, 0.431 40.6%, 0.532 42.7%, 0.996 48%, 0.677 51.9%, 0.607 53.4%, 0.582 54.9%, 0.605 56.4%, 0.673 57.9%, 0.999 62%, 0.786 65%, 0.74 66.2%, 0.724 67.4%, 0.739 68.6%, 0.782 69.8%, 0.999 73.4%, 0.878 75.7%, 0.837 77.8%, 0.87 79.9%, 1 83.2%, 0.942 85.1%, 0.923 86.9%, 0.936 88.5%, 1 92%, 0.981 94.5%, 1)
      }
      .item:hover
{
    transform: scale(1.2);
} 
.item:hover+.drop{
    /* display: block; */
    opacity: 1;
}   
.drop{width: 100px;
height: 100px;
background: url(./img/rhino.jpg);
/* display: none; */
opacity: 0;
transition-property: opacity  ;
transition-duration: 1s;
}

</style>
  </head>
  <body>
    <div class="container">
      <div class="item">Hover Me</div>
      <div class="drop">Hover Me</div>
      
    </div>
  </body>
</html>
