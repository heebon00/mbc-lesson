<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .wrap {
        width: 300px;
        height: 300px;
        margin: auto;
        position: relative;
        border-radius: 30px;
        background: peachpuff url(/02/img/bg_animation.png) no-repeat center    center;
        background-size: 100px;
      }
      .box{
        position: absolute;
        left: 100px;
        top: 100px;
      }
      .box::before {
        content: "";
        position: absolute;
        background: url(./02/img/ani_spade.png);
        width: 80px;
        height: 80px;
        animation: beat 2s infinite ease;
      }
      @keyframes beat {
        to{transform: scale(calc(var(--size)*0.8));
        opacity: 0;}
      }
      .box:nth-child(1){
        --size:1.6;
      }
      .box:nth-child(2){
        --size:1.5;
      }
      .box:nth-child(3){
        --size:2;
      }
      .box:nth-child(4){
        --size:2.8;
      }
      .box:nth-child(5){
        --size:1.3;
      }

    </style>
  </head>
  <body>
  <div class="wrap">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </body>
</html>
