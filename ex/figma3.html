<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFFIN CAFE - Banner Design</title>
    <!-- 구글 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@800&display=swap" rel="stylesheet">
    <!-- 별도 CSS 파일 연결 -->
    <link rel="stylesheet" href="css/caffin_banner.css">
</head>
<body>
    <div class="banner-container">
        <!-- 데코레이션 요소 -->
        <div class="box top-box"></div>
        <div class="box left-box"></div>
        <div class="box right-box"></div>
        <div class="box bottom-box"></div>

        <!-- 헤드라인 텍스트 -->
        <div class="text-box headline">
            <span class="caffin">CAFFIN</span>
            <span class="caffe">"Coffee First, Schemes Later"</span>
            <span class="cafe">CAFE</span>
        </div>

        <!-- 하단 정보 텍스트 -->
        <div class="text-box location">
            <p class="open">“open” for sale</p>
            <p class="price">Americano 1,000 won</p>
        </div>
    </div>

</body>
</html>
