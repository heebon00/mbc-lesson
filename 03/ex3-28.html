<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>구구단 2단~3단<h1>
    <script>
        for(let i=1; i<10; i++){ //i는 1부터9까지 반복
            document.write(`2 x ${i} = ${2*i}<br>`);
        }
        for(let i=1; i<=9; i++)  // i는 1부터9까지 반복
        { document.write(`3 x ${i} = ${3*i}<br>`);}
    </script>
</body>
</html>
