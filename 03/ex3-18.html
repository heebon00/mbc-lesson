<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>회원님 안녕하새오</h1>
    <script>
        let input = prompt("회원가입 여부를 입력하세요","회원,비회원");
        input ==='회원' ? document.write ('<h1>회원님 안녕하새오</h1>'): document.write ('<h1>회원가입해주새오</h1>');
    </script>
</body>
</html>
