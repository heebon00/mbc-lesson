<body>
     <p>신장(cm) <input type="number" id="height" name="height"></p>
     <p>체중(kg): <input type="number" id="weight" name="weight"></p>
<button onclick="check()"> 결과보여주세요 </button>   
<hr>
<p id='result'></p>
<script>

//# 속성이 있는 요소는 바로 변수로 사용가능 > 권장X 
function check(){
  const h = height.value;
  const w = weight.value; 
  const ideale = (h-100)*0.9;
  if (w > idele) {
    result.textContent = "비정상";
  } 
  if (w == ideale) {
    result.textContent = "정상";
  }
  if (w < ideale) {
    result.textContent = "몸무게 미달";
  }}
</script>
</body>
