<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <body>
    <!-- dialog => 팝업  -->
    <dialog id="pop" closedby="any">
<p>모래반지빵야빵야_좋은게 좋은거</p>
<button commandfor="pop" command="close">OK</button>     <!-- commandfor='pop'처음은 명령어지정(dialog id 지정값과 동일하게지정) 후 command 지정-->
    </dialog>
    <button commandfor="pop" command="show-modal">오쁜</button>
</body>
</body>
</html>
