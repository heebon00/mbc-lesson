<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레시피재료 </title>
    <style>table,tr,td,th{border: 1px solid;}</style>
    <style>caption{text-align: center;}</style>
    <style>th.highlight{background-color: rgb(226, 226, 226);}</style>
    <link rel="stylesheet" href="../02/ex2-1.css">
    <link rel="stylesheet" href="../02/ex2-2.css">

</head>
<body>
    <img src="img/07.png" alt="샴푸레시피타이틀">
<table>  
    <thead>
<h1><caption>레시피 재료</caption></h1>
    </thead>
    <tbody>
    <tr>
        <th class="highlight">재료</th>
        <th class="highlight">첨가량</th>
        <th class="highlight">48시간</th>
        <th class="highlight">대체재료</th>
    </tr>
    <tr>
        <th rowspan="5">수상층</th>
        <td>로즈마리 추출물</td>
        <td>30g</td>
        <td rowspan="3">증류수</td>
    </tr>
    <tr>
        <td>네틀추출물</td>
        <td>30g</td>
        
    </tr>
    <tr>
        <td>증류수</td>
        <td>90g</td>
        
    </tr>
    <tr>
        <td>폴리쿼터</td>
        <td>1.5g</td>
        <td>쟁탄검</td>
    </tr>
    <tr>
        <td>글리세린</td>
        <td>10g</td>
        <td>히아루론산 10g</td>
    </tr>
       <tr> 
        <th rowspan="3">계면활성제</th>
        <td>LES/CDE</td>
        <td>180g/10g</td>
        <td>CDE + LES</td>
    </tr>
     <tr>
        <td>코코베타인</td>
        <td>5g</td>
        <td>X</td>
    </tr>
    <tr>
        <td>애플 계면 활성제</td>
        <td>10g</td>
        <td>올리브 계면 활성제</td>
   
     
</tbody>
<tfoot></tr>
        <tr>
        <th class="highlight" colspan="4">좋은 향을 위해서 엘라스틴향 사용 추천 </th>
    </tr></tfoot>
</table>


</body>
</html>
