<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>셀병합하기</title>
    <style>table,tr.th,td{border: 1px solid;}
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="3">1</td>    <!--colspan 가로 병합할 갯수까지 카운터-->
        </tr>
        <tr>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
    </table>  
    <hr>
    <!--3행3열  <table>(tr>td*3)*3 -->
        <table> 
        <tr>
            <td rowspan="4">1</td>    <!--rowspan 세로 병합할 갯수까지 카운터-->
        </tr>
        <tr>   
            <td>2</td>
            <td>3</td>
        </tr>
        <tr> 
            <td>4</td>
            <td>5</td>
        </tr>
        <tr>
            <td>6</td>
            <td>7</td>
        </tr>
</body>
</html>
