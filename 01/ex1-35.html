    <pre>
        html 태그의 마크업 규칙
        블럭레벨 > 인라인레벨
        단, div는 예외
        h2>p X  => h2>div 
        p>h1 X  => p>div
        ul>li>p X  => ul>li>div

    <span>작은div</span>
    <span>의미 없는 인라인 레벨의 그룹핑</span>
