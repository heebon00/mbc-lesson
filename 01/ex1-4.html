<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heading</title>
    <!--탭제목-->
  </head>
  <body>
    <!--heading : 웹페이지의 제목을 표시 -->
    <!--heading : 웹페이지의 제목을 표시 / 윗 문장 복사 단축키 alt+shif+아래방향키 /  단어마다 선택 ctnl+shif+왼쪽 방향키>
    !--제목의 중요도에 따라 작은 숫자로 표시-->
    <!-- h1은 페이지에서 단 한개만 사용 가장 중요한 제목>
    !--h$*6 h순번 6까지 생성 단축어-->
    <h1>Title</h1>
    <h2>Title</h2>
    <h3>Title</h3>
    <h4>Title</h4>
    <h5>Title</h5>
    <h6>Title</h6>
  </body>
</html>
