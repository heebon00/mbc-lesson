<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <!--form : 웹브라우저에서 유일하게 사용자의 데이터를 입력받을수 있는 요소 
    action : 사용자 정보를 저장할 서버주소
    method :  전송방식(get-공개형, post-비공개형)-->
    <form action="#" method="get">
        <fieldset>
            <legend>로그인 입력창</legend>
            <p>ID: <input type="text"></p>
            <p>PW: <input type="password"></p>
            <p>검색: <input type="text"></p>
            <p>이메일: <input type="text"></p>
            <p>전화번호: <input type="number"></p>
            <p>컬러선택: <input type="컬러?"></p>
            <p>수량: <input type="number"></p>
            <p>만족도: <input type=""></p>
            
            

        </fieldset>

    </form>
</body>
</html>
