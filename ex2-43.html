<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배경이미지의 크기</title>
    <style>
      .who {
        height: 150px;
        margin-bottom: 10px;
        background: #67758e url(./02/img/bg_size.png) no-repeat;
      }
      .who1 {
        background-size: 200px 200px; /* 첫번째 가로 두번째세로  */
        background-position: center;
      } 
      .who2 {
        /* width:10rem height:auto */
        background-size: 10rem;
      }
      .who3 {
        /* width: auto height:150% */
        background-size: auto 150%;
      }
      .who4 {
       background-size: cover; /* 넓이기준으로 채우기 */
        background-position: 0 center;
      }
      .who5 { 
        background-size: contain; /* 높이기준으로 채우기 */
      }
    </style>
  </head>
  <body>
    <div class="who who1"></div>
    <div class="who who2"></div>
    <div class="who who3"></div>
    <div class="who who4"></div>
    <div class="who who5"></div>
  </body>
</html>
